services:
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: 1122
      MYSQL_DATABASE: eotech
    ports:
      - 3308:3306
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: 1122
    ports:
      - 8090:80
    depends_on:
      - db
  
  redis:
    image: redis:latest
    command: redis-server --requirepass 1122
    ports:
      - 6379:6379
    environment:
      - REDIS_PASSWORD=1122
      - REDIS_HOST=redis
      - REDIS_USERNAME=default
      - REDIS_PORT=6379


volumes:
  mysql-data:
